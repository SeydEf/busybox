<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Todo Manager</title>
    <style>
      :root {
        --primary: #0070f3;
        --danger: #ef4444;
        --bg: #f9fafb;
        --card-bg: white;
        --text: #1f2937;
        --text-muted: #6b7280;
        --border: #e5e7eb;
        --radius: 12px;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #111827;
          --card-bg: #1f2937;
          --text: #f9fafb;
          --text-muted: #9ca3af;
          --border: #374151;
        }
      }

      body {
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
        background: var(--bg);
        color: var(--text);
        max-width: 550px;
        margin: 4rem auto;
        padding: 0 1rem;
        transition: background 0.3s;
      }

      .container {
        background: var(--card-bg);
        padding: 2.5rem;
        border-radius: var(--radius);
        box-shadow:
          0 4px 6px -1px rgba(0, 0, 0, 0.1),
          0 2px 4px -1px rgba(0, 0, 0, 0.06);
      }

      h1 {
        margin-top: 0;
        font-size: 2rem;
        font-weight: 800;
        text-align: center;
        letter-spacing: -0.025em;
        margin-bottom: 2rem;
      }

      .input-group {
        display: flex;
        gap: 12px;
        margin-bottom: 1.5rem;
      }

      input[type="text"] {
        flex: 1;
        padding: 12px 16px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text);
        font-size: 16px;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }

      input[type="text"]:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(0, 112, 243, 0.2);
      }

      .btn {
        padding: 12px 20px;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: var(--radius);
        cursor: pointer;
        font-size: 16px;
        font-weight: 600;
        transition: opacity 0.2s;
      }

      .btn:hover {
        opacity: 0.9;
      }

      .filters {
        display: flex;
        gap: 8px;
        margin-bottom: 1.5rem;
        justify-content: center;
      }

      .filter-btn {
        padding: 6px 12px;
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 20px;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 14px;
        transition: all 0.2s;
      }

      .filter-btn.active {
        background: var(--primary);
        color: white;
        border-color: var(--primary);
      }

      ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      li {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px;
        background: var(--bg);
        margin-bottom: 10px;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        transition: transform 0.1s;
      }

      li:hover {
        transform: translateY(-1px);
      }

      .todo-text {
        flex: 1;
        cursor: pointer;
        font-size: 16px;
      }

      .todo-text.completed {
        text-decoration: line-through;
        color: var(--text-muted);
      }

      .actions {
        display: flex;
        gap: 8px;
      }

      .icon-btn {
        padding: 6px;
        background: transparent;
        border: none;
        cursor: pointer;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-muted);
        transition:
          background 0.2s,
          color 0.2s;
      }

      .delete-btn:hover {
        background: #fee2e2;
        color: var(--danger);
      }

      .edit-btn:hover {
        background: var(--border);
        color: var(--primary);
      }

      .stats {
        margin-top: 1.5rem;
        padding-top: 1rem;
        border-top: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 14px;
        color: var(--text-muted);
      }

      .clear-btn {
        background: transparent;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        text-decoration: underline;
      }

      .clear-btn:hover {
        color: var(--text);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Todos</h1>
      <div class="input-group">
        <input
          type="text"
          id="todoInput"
          placeholder="What needs to be done?"
        />
        <button class="btn" onclick="addTodo()">Add</button>
      </div>

      <div class="filters">
        <button class="filter-btn active" onclick="setFilter('all')">
          All
        </button>
        <button class="filter-btn" onclick="setFilter('active')">Active</button>
        <button class="filter-btn" onclick="setFilter('completed')">
          Completed
        </button>
      </div>

      <ul id="todoList"></ul>

      <div class="stats">
        <span id="itemCount">0 items left</span>
        <button class="clear-btn" onclick="clearCompleted()">
          Clear Completed
        </button>
      </div>
    </div>

    <script>
      let todos = JSON.parse(localStorage.getItem("todos")) || [];
      let filter = "all";

      function setFilter(newFilter) {
        filter = newFilter;
        document.querySelectorAll(".filter-btn").forEach((btn) => {
          btn.classList.toggle(
            "active",
            btn.innerText.toLowerCase() === newFilter,
          );
        });
        renderTodos();
      }

      function renderTodos() {
        const list = document.getElementById("todoList");
        const count = document.getElementById("itemCount");
        list.innerHTML = "";

        const filteredTodos = todos.filter((todo) => {
          if (filter === "active") return !todo.completed;
          if (filter === "completed") return todo.completed;
          return true;
        });

        filteredTodos.forEach((todo, index) => {
          const originalIndex = todos.indexOf(todo);
          const li = document.createElement("li");
          li.innerHTML = `
                    <span class="todo-text ${todo.completed ? "completed" : ""}" onclick="toggleTodo(${originalIndex})">
                        ${escapeHtml(todo.text)}
                    </span>
                    <div class="actions">
                        <button class="icon-btn edit-btn" onclick="editTodo(${originalIndex})">✎</button>
                        <button class="icon-btn delete-btn" onclick="deleteTodo(${originalIndex})">✕</button>
                    </div>
                `;
          list.appendChild(li);
        });

        const activeCount = todos.filter((t) => !t.completed).length;
        count.innerText = `${activeCount} item${activeCount === 1 ? "" : "s"} left`;

        localStorage.setItem("todos", JSON.stringify(todos));
      }

      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      function addTodo() {
        const input = document.getElementById("todoInput");
        const text = input.value.trim();
        if (text) {
          todos.push({ text, completed: false });
          input.value = "";
          renderTodos();
        }
      }

      // Add Enter key listener
      document.getElementById("todoInput").addEventListener("keypress", (e) => {
        if (e.key === "Enter") addTodo();
      });

      function toggleTodo(index) {
        todos[index].completed = !todos[index].completed;
        renderTodos();
      }

      function deleteTodo(index) {
        if (confirm("Delete this todo?")) {
          todos.splice(index, 1);
          renderTodos();
        }
      }

      function editTodo(index) {
        const newText = prompt("Edit todo:", todos[index].text);
        if (newText !== null && newText.trim() !== "") {
          todos[index].text = newText.trim();
          renderTodos();
        }
      }

      function clearCompleted() {
        if (confirm("Clear all completed todos?")) {
          todos = todos.filter((t) => !t.completed);
          renderTodos();
        }
      }

      // Initial render
      renderTodos();
    </script>
  </body>
</html>
